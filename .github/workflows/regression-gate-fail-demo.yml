name: Controlled Regression Detection Demo

on:
  workflow_dispatch:

jobs:
  controlled-regression-detection-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run baseline benchmark
        run: |
          python benchmarks/inference_benchmark.py \
            --device cpu \
            --output results/baseline.json \
            --controlled-delay-ms 0

      - name: Run controlled candidate regression
        run: |
          python benchmarks/inference_benchmark.py \
            --device cpu \
            --output results/candidate.json \
            --controlled-delay-ms 2.0

      - name: Verify regression gate detects failure
        run: |
          set +e

          python scripts/compare_regression.py \
            --baseline results/baseline.json \
            --candidate results/candidate.json

          EXIT_CODE=$?

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "ERROR: Controlled regression was expected to fail, but it passed."
            exit 1
          fi

          echo "Controlled regression was detected as expected."
          exit 0