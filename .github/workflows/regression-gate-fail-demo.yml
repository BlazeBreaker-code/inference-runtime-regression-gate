name: Inference Runtime Regression Gate Fail Demo

on:
  workflow_dispatch:

jobs:
  regression-gate-fail-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run baseline benchmark
        run: |
          python benchmarks/inference_benchmark.py \
            --device cpu \
            --output results/baseline.json \
            --controlled-delay-ms 0

      - name: Run controlled candidate regression
        run: |
          python benchmarks/inference_benchmark.py \
            --device cpu \
            --output results/candidate.json \
            --controlled-delay-ms 0.20

      - name: Compare regression
        run: |
          python scripts/compare_regression.py \
            --baseline results/baseline.json \
            --candidate results/candidate.json